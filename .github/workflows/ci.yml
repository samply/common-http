# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: ["master", "develop", "feature/automaticDeployment"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sourcecode
      uses: actions/checkout@v2
    - name: Setup Java for publishing to Maven Central
      uses: actions/setup-java@v2
      with:
        java-version: 8
        distribution: 'adopt'
        server-id: ossrh
        # osshr sonatype jira user and password
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
    - name: Install GPG Secret Key for signing the artifact
      id: install-secret-key
      run: |
        cat <(echo -e "${{ secrets.OSSRH_GPG_SECRET_KEY }}") | gpg --batch --import
        gpg --list-secret-keys --keyid-format LONG
    - name: Run the unit tests
      run: mvn --batch-mode test
    - name: Build with Maven
      run: mvn -X --batch-mode -Dgpg.passphrase=${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }} deploy
